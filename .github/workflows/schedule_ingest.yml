name: Automated HDFC Scheme Factsheet & SID Ingestion Scheduler

on:
  schedule:
    # 03:30 UTC corresponds exactly to 9:00 AM IST (UTC+5:30) every day (off-peak minute avoids GitHub Actions queue delays)
    - cron: '30 3 * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions UI

permissions:
  contents: write

jobs:
  run-ingestion:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Run Automated Scraper and Vector Indexing Pipeline
        env:
          QDRANT_PATH: .qdrant
          QDRANT_COLLECTION: hdfc_funds
          ENVIRONMENT: production
          LOG_LEVEL: INFO
        run: |
          echo "Starting daily synchronization at 9:00 AM IST (03:30 UTC)..."
          python -m scripts.ingest_all --collection hdfc_funds --force-scrape
          echo "Ingestion completed successfully."

      - name: Commit and Push Updated Corpus to GitHub
        run: |
          git config --global user.name "GitHub Action Scheduler"
          git config --global user.email "action@github.com"
          git add data/schemes.json
          if git diff --staged --quiet; then
            echo "No changes detected in scheme corpus or vector index."
          else
            git commit -m "chore(scheduler): auto-refresh HDFC scheme factsheet data and Qdrant index"
            git push origin main
            echo "Successfully pushed updated corpus to GitHub main branch."
          fi

      - name: Sync to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_URL: ${{ vars.HF_SPACE_URL }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE_URL" ]; then
            echo "HF_TOKEN secret or HF_SPACE_URL variable not set in GitHub repository settings. Skipping Hugging Face sync."
          else
            git config --global user.name "GitHub Action Scheduler"
            git config --global user.email "action@github.com"
            git remote add hf https://oauth2:$HF_TOKEN@$HF_SPACE_URL || git remote set-url hf https://oauth2:$HF_TOKEN@$HF_SPACE_URL
            git push -f hf main
            echo "Successfully synced updated corpus to Hugging Face Hub."
          fi

      - name: Upload Qdrant Index Artifacts (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: qdrant-vector-db
          path: .qdrant/
          retention-days: 7
